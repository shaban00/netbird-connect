name: 'NetBird Connect Runner'
description: 'Connect your GitHub Action workflow to your NetBird network'
author: 'Shaban Mohammedsaani Hassan (shaban00)'
branding:
  icon: 'share-2'
  color: 'orange'

inputs:
  setup-key:
    description: 'Ephemeral, reusable NetBird setup key'
    required: true
  management-url:
    description: 'NetBird management URL'
    required: false
    default: 'https://api.netbird.io:443'
  hostname:
    description: 'Peer name shown in the NetBird dashboard'
    required: false
    default: 'gh-runner-${{ github.event.repository.name }}'
  version:
    description: >-
      NetBird client version to install. Defaults to "latest" (newest stable release). Pin to a specific version (e.g. 0.73.1) to match your fleet and avoid a runner silently jumping ahead of your peers.
    required: false
    default: 'latest'
  preshared-key:
    description: 'WireGuard preshared key, if your peers require one'
    required: false
    default: ''
  allow-ssh:
    description: 'Enable NetBird SSH access to the runner before exposing. Starts the embedded SSH server with root and no SSH-layer auth, so access is gated only by your NetBird policy. Default false.'
    required: false
    default: 'false'
  github-token:
    description: >-
      Token used only to authenticate the GitHub API call that resolves "latest" (avoids shared-runner rate limits). Defaults to the workflow token; no extra permissions needed.
    required: false
    default: ${{ github.token }}

runs:
  using: 'composite'
  steps:
    - name: Install
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        NB_VERSION: ${{ inputs.version }}
      run: bash "${{ github.action_path }}/scripts/install.sh"

    - name: Connect
      shell: bash
      env:
        NB_SETUP_KEY: ${{ inputs.setup-key }}
        NB_MANAGEMENT_URL: ${{ inputs.management-url }}
        NB_HOSTNAME: ${{ inputs.hostname }}
        NB_PRESHARED_KEY: ${{ inputs.preshared-key }}
        ALLOW_SSH: ${{ inputs.allow-ssh }}
      run: bash "${{ github.action_path }}/scripts/connect.sh"
